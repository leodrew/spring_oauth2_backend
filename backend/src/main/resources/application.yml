# =============================================================================
# pmc-epmmformquerygui — application.yml
# Spring Boot 3.4.x · Spring Security 6.4.x · Java 17 · Keycloak OIDC
# =============================================================================

app:
  context-prefix: /gui_epmmFormQuery

  # Frontend (SPA) hosting --------------------------------------------------
  frontend:
    url-prefix: ${app.context-prefix}/web
    resource-location: classpath:/gui_epmmFormQuery/web/
    index-path: ${app.context-prefix}/web/index.html
    classpath-base: gui_epmmFormQuery/web

  # Token refresh -----------------------------------------------------------
  token-refresh:
    enabled: true
    skew-seconds: 60
    schedule-rate-ms: 60000

  # Silent re-authentication -----------------------------------------------
  silent-auth:
    enabled: true
    hint-cookie-name: ea_login_hint
    hint-cookie-max-age-seconds: 2592000   # 30 days
    cookie-secure: true   # set false ONLY for plain-HTTP local dev, or the clear-cookie fails and prompt=none loops

  # WebClient base URLs -----------------------------------------------------
  downstream:
    base-url: ${DOWNSTREAM_API_URL:http://internal-api:8080}
  third-party:
    base-url: ${THIRD_PARTY_API_URL:https://partner.example.com}

  # Keycloak URLs -----------------------------------------------------------
  # {baseUrl} is resolved per request by OidcClientInitiatedLogoutSuccessHandler
  # (correct per environment now that forward-headers-strategy is set). Override
  # with POST_LOGOUT_REDIRECT_URI if an environment needs a fixed value. The
  # resolved URL must appear in the Keycloak client's Valid Post Logout Redirect
  # URIs for that environment (docs/keycloak-realm-checklist.md).
  post-logout-redirect-uri: ${POST_LOGOUT_REDIRECT_URI:{baseUrl}${app.context-prefix}/page/logged-out}

  # Optional ----------------------------------------------------------------
  privilege:
    enabled: false                # set true to activate PrivilegeCheckFilter

# Server settings — context-path NOT set on purpose (v4 design)
server:
  port: 8080
  # LOAD-BEARING behind the TLS-terminating Istio mesh: makes {baseUrl} in the
  # OAuth2 redirect-uri, request.isSecure(), and HSTS emission honor
  # X-Forwarded-Proto/-For. Without it Tomcat sees plain HTTP and the redirect
  # URI can resolve to http:// (exact-match failure at Keycloak). Safe when no
  # X-Forwarded-* headers arrive (no-op); the pod is only reachable via the
  # sidecar, so trusting these headers is acceptable. Do not remove.
  forward-headers-strategy: framework
  servlet:
    session:
      timeout: 8h
      cookie:
        same-site: lax
        secure: true
        http-only: true

# Spring Security OAuth2 client ------------------------------------------------
spring:
  security:
    oauth2:
      client:
        registration:
          keycloak:
            client-id: ${KEYCLOAK_CLIENT_ID}
            client-secret: ${KEYCLOAK_CLIENT_SECRET}
            authorization-grant-type: authorization_code
            scope: openid, profile, email
            redirect-uri: "{baseUrl}/gui_epmmFormQuery/login/oauth2/code/{registrationId}"
        provider:
          keycloak:
            user-name-attribute: preferred_username

# Logging ---------------------------------------------------------------------
logging:
  pattern:
    console: "%d{HH:mm:ss.SSS} [%X{traceId:-}] %-5level %logger{36} - %msg%n"
  level:
    com.example.epmmformquery: INFO
    com.example.epmmformquery.security.TokenRefreshFilter: DEBUG
    com.example.epmmformquery.security.ScheduledTokenRefreshTask: INFO
    com.example.epmmformquery.security.SilentAuthFailureHandler: INFO
    com.example.epmmformquery.security.SilentAuthRequestResolver: DEBUG
    org.springframework.security.oauth2.client: INFO
    org.springframework.web.reactive.function.client: INFO

# Actuator endpoints (referenced by SecurityConfig permitAll list)
management:
  endpoints:
    web:
      exposure:
        include: health, info
  endpoint:
    health:
      show-details: when-authorized

---
spring:
  config:
    activate:
      on-profile: "!test"
  security:
    oauth2:
      client:
        provider:
          keycloak:
            issuer-uri: ${KEYCLOAK_ISSUER_URI}
